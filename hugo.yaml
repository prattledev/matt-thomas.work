baseURL: https://www.matt-thomas.work
languageCode: en-gb
title: Matt Thomas
theme: PaperMod

caches:
  images:
    dir: :cacheDir/images

params:
  env: production
  analytics:
    google:
      SiteVerificationTag: P-wIWVinm5NP11vEuW0qjB1UXvL5WqinhElhQLWQjlk
  title: Matt Thomas
  description: "Broadcast and AoIP engineering — writing about the systems that keep live events on air."
  keywords: [Broadcast Engineering, AoIP, SDI, Ravenna, Audio Engineering, Live Production, IP Media]
  author: Matt Thomas
  defaultTheme: light
  disableThemeToggle: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  profileMode:
    enabled: true # needs to be explicitly set
    title: Hello 👋
    subtitle: "Broadcast & AoIP engineering - writing about the systems that keep live events on air."
    imageUrl: mt_profile.jpg
    imageWidth: 180
    imageHeight: 175
    imageTitle: Matt Thomas Profile
    buttons:
      - name: About
        url: about
      - name: Posts
        url: posts
      - name: Projects
        url: projects

  socialIcons:
    - name: github
      url: https://github.com/prattledev
    - name: linkedin
      url: https://www.linkedin.com/in/mrmthomas/
    - name: rss
      url: /index.xml

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: /assets/favicon.ico
    favicon16x16: /assets/favicon-16x16.png
    favicon32x32: /assets/favicon-32x32.png
    apple_touch_icon: /assets/apple-touch-icon.png

menu:
  main:
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 5
